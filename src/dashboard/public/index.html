<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pensieve Dashboard</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="title-group">
          <h1>Pensieve</h1>
          <p>Daily insight analytics</p>
        </div>
        <div class="date-picker-section">
          <label for="date-picker">Date</label>
          <select id="date-picker"></select>
        </div>
      </header>

      <nav class="tab-nav">
        <button class="tab-button active" data-tab="overview">Overview</button>
        <button class="tab-button" data-tab="top-insights">Top Insights</button>
        <button class="tab-button" data-tab="recurring">Recurring Patterns</button>
        <button class="tab-button" data-tab="by-project">By Project</button>
      </nav>

      <main>
        <div class="tab-panel active" data-tab-panel="overview">
          <div class="stat-strip" id="stat-strip"></div>

          <section class="card">
            <h2>
              Effort Breakdown
              <span class="card-hint">today</span>
            </h2>
            <div class="chart-container small">
              <canvas id="effort-breakdown-chart"></canvas>
            </div>
          </section>

          <section class="card">
            <h2>
              Toil Over Time
              <span class="card-hint">last 30 days</span>
            </h2>
            <div class="chart-container small">
              <canvas id="effort-trend-chart"></canvas>
            </div>
          </section>

          <section class="card span-full">
            <h2>
              Category Trend
              <span class="card-hint">last 30 days</span>
            </h2>
            <div class="chart-container">
              <canvas id="category-trend-chart"></canvas>
            </div>
          </section>
        </div>

        <div class="tab-panel" data-tab-panel="top-insights">
          <section class="card span-full">
            <h2>Top Insights</h2>
            <div id="top-insights-container"></div>
          </section>
        </div>

        <div class="tab-panel" data-tab-panel="recurring">
          <section class="card span-full">
            <h2>Recurring Patterns</h2>
            <div id="recurrence-container"></div>
          </section>
        </div>

        <div class="tab-panel" data-tab-panel="by-project">
          <section class="card span-full" id="cross-project-section" style="display: none">
            <h2>By Project</h2>
            <div id="cross-project-container"></div>
          </section>
        </div>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
