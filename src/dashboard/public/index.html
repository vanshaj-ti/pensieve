<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pensieve Dashboard</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Pensieve Analytics</h1>
      </header>

      <div class="date-picker-section">
        <label for="date-picker">Select Date:</label>
        <select id="date-picker"></select>
      </div>

      <main>
        <section class="chart-section">
          <h2>Effort Breakdown</h2>
          <div class="chart-container">
            <canvas id="effort-breakdown-chart"></canvas>
          </div>
        </section>

        <section class="chart-section">
          <h2>Category Trend (30 days)</h2>
          <div class="chart-container">
            <canvas id="category-trend-chart"></canvas>
          </div>
        </section>

        <section class="chart-section">
          <h2>Effort Breakdown Trend (30 days)</h2>
          <div class="chart-container">
            <canvas id="effort-trend-chart"></canvas>
          </div>
        </section>

        <section class="table-section">
          <h2>Top Insights</h2>
          <div id="top-insights-container"></div>
        </section>

        <section class="table-section">
          <h2>Recurring Patterns</h2>
          <div id="recurrence-container"></div>
        </section>

        <section class="table-section" id="cross-project-section" style="display: none">
          <h2>Cross-Project Rollup</h2>
          <div id="cross-project-container"></div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
