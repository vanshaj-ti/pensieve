# gantry.toml — Gantry pipeline configuration for Pensieve
# Pipeline: plan -> build -> evidence -> review

project_id = "pensieve"

stages = ["plan", "build", "evidence", "review"]

prompts_dir = ".gantry/prompts"

[agent]
runner = "claude-code"
skip_permissions = true
output_format = "json"
max_concurrent = 2

[models.plan]
model = "claude-sonnet-5"
max_turns = 40
plan_mode = true

[models.build]
model = "claude-haiku-4-5"
max_turns = 150

[models.evidence]
model = "claude-sonnet-5"
max_turns = 120

[models.resolve]
model = "claude-sonnet-5"
max_turns = 80
timeout = 900

[review]
enabled = true
runner = "codex-cli"
model = "openai-group/gpt-5.6-terra"
approve_keywords = ["APPROVE"]
request_changes_keywords = ["REQUEST_CHANGES"]
escalate_keywords = ["ESCALATE"]

[git]
base_branch = "main"
# main now has branch protection (no direct push, PR + passing CI required
# to merge). auto_ship only pushes to the run's own feature branch and
# opens a PR against main — safe to keep on. auto_merge is the one that
# bypasses human review (auto-merges the PR itself) and defeats the point
# of requiring PRs, so it stays off until the ship flow is revisited.
auto_ship = true
auto_merge = false

[scope]
forbid_paths = [".env", "**/*.pem", "**/secrets/**", "**/*.key"]
enforce_plan_scope = true

[checks]
# Mirrors real CI exactly (.github/workflows/static-checks.yml + tests.yml)
# so a run that passes gantry's local checks never fails GitHub Actions
# after auto_ship opens the PR. format:check/typecheck were missing here
# once — PR #8 passed gantry's checks (lint/build/test) but failed real CI
# on format:check, since the build agent never ran `npm run format` before
# committing and nothing local caught it.
commands = ["npm run format:check", "npm run lint", "npm run typecheck", "npm run build", "npm test"]
timeout = 900
auto_resolve = true
resolve_attempts = 2

[notify]
backend = "none"

[skills]
enabled = []

[mcp]
enabled = []

[herdr]
enabled = true
report_state = true
